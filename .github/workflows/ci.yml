name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux-x64 is the primary target for this project; listed first so it
          # is the leading status. Building on Linux exercises the cross-platform
          # Avalonia code paths and the OS-conditional OutputType (Exe).
          - os: ubuntu-latest
            rid: linux-x64
          # win-x64 is the secondary target. Building on a Windows runner keeps
          # the csproj's OS-conditional OutputType (WinExe) correct.
          - os: windows-latest
            rid: win-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          # Pinned to the major version targeted by the projects (net10.0).
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/OptiscalerManager.App/OptiscalerManager.App.csproj -r ${{ matrix.rid }}

      - name: Build app
        run: >
          dotnet build src/OptiscalerManager.App/OptiscalerManager.App.csproj
          -c Release -r ${{ matrix.rid }} --no-restore

      # Unit tests guard the risky pure logic ported into Core (PE inspection,
      # section-aware ini editing, custom-FSR4 version gate, FSR SDK-package scan)
      # plus the component registry (mutual exclusion + preview).
      - name: Test
        run: dotnet test tests/OptiscalerManager.Core.Tests/OptiscalerManager.Core.Tests.csproj -c Release
