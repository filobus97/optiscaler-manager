name: Release

on:
  push:
    tags:
      - "v*"
    # Merge-based fallback: a push to main whose commit message contains
    # "[release]" also cuts a release (version read from the csproj, tag created
    # by the release job). Useful when tags can't be pushed directly. Pushes to
    # main WITHOUT the marker skip all jobs via the job-level "if".
    branches:
      - main
  # Manual fallback: release without pushing a tag (the release step below
  # creates the tag).
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v (e.g. 0.1.0)"
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.rid }})
    # A branch push only releases when explicitly marked; tags and manual
    # dispatches always release.
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      contains(github.event.head_commit.message, '[release]')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux-x64 (primary) first, then win-x64, then macOS.
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64
          - os: macos-latest
            rid: osx-x64

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # [release]-marked push to main: the csproj is the source of truth.
            v=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' src/OptiscalerManager.App/OptiscalerManager.App.csproj | head -1)
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi

      # Untrimmed self-contained single-file publish. PublishTrimmed stays off
      # (Avalonia + reflection paths are not verified trim-safe).
      - name: Publish
        run: >
          dotnet publish src/OptiscalerManager.App/OptiscalerManager.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -o publish

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "OptiscalerManager-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip"

      # zip (not Compress-Archive) on Unix so the executable bit survives.
      - name: Create zip (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd publish
          zip -r "../OptiscalerManager-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: OptiscalerManager-${{ matrix.rid }}
          path: OptiscalerManager-*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            v=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' src/OptiscalerManager.App/OptiscalerManager.App.csproj | head -1)
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      # On workflow_dispatch the tag does not exist yet; tag_name +
      # target_commitish make action-gh-release create it at the built commit.
      - name: Create release and attach zips
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: artifacts/*.zip
          generate_release_notes: true
          draft: false
